<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Underwater Simulator · BlueROV2</title>
    <meta name="description" content="Simulador visual de robótica marina: pilota un BlueROV2 con movimiento holonómico 6-DOF en un ambiente submarino." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23063040'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%2346e6ff' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%2346e6ff'/%3E%3C/svg%3E" />
  </head>
  <body>
    <!-- Canvas de Three.js -->
    <canvas id="app"></canvas>

    <!-- Pantalla de carga -->
    <div id="loading">
      <div class="loading-inner">
        <div class="sonar"></div>
        <p>Sumergiendo el BlueROV2…</p>
      </div>
    </div>

    <!-- HUD de telemetría (se rellena desde JS) -->
    <div id="hud" class="panel"></div>

    <!-- Indicador de modo de cámara -->
    <div id="cam-indicator" class="tag"></div>

    <!-- Overlay de ayuda de teclas (se rellena desde JS) -->
    <div id="help" class="panel"></div>

    <!-- Pista de teclas siempre visible -->
    <div id="hint" class="tag">Pulsa <b>H</b> para ver los controles</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
